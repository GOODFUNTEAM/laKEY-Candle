<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT-TEC LUCK TERMINAL x GOODFUN</title>
    <style>
        :root {
            --pip-green: #18ff62;
            --pip-bg: #0c120c;
            --pip-dim: #063d17;
            --pip-error: #ff3b3b;
        }

        body {
            background-color: var(--pip-bg);
            color: var(--pip-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-transform: uppercase;
            overflow: hidden;
        }

        /* 螢幕掃描線特效層 */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* 鎖定畫面 */
        #lock-screen {
            position: fixed;
            inset: 0;
            background: var(--pip-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            border: 15px solid var(--pip-dim);
        }

        /* LOGO 容器與旋轉動畫 */
        #logo-container {
            width: 120px;
            height: 120px;
            margin-bottom: 30px;
            transition: transform 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        /* 初始慢速旋轉 */
        .rotate-slow {
            animation: spin 8s linear infinite;
        }

        /* 抽籤時的高速旋轉 */
        .rotate-fast {
            animation: spin 0.2s linear infinite !important;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 主視窗容器 */
        .terminal-window {
            display: none;
            width: 90%;
            max-width: 480px;
            border: 2px solid var(--pip-green);
            padding: 20px;
            box-shadow: 0 0 20px var(--pip-dim);
            position: relative;
        }

        .header {
            border-bottom: 2px solid var(--pip-green);
            margin-bottom: 15px;
            padding-bottom: 8px;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
        }

        /* 運勢等級列表 */
        .ranks-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .rank-item {
            border: 1px solid var(--pip-green);
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }

        .tag { font-weight: bold; }
        .sssr { background: var(--pip-green); color: var(--pip-bg); animation: flicker 0.1s infinite; }
        .sp { border: 1px dashed var(--pip-green); text-decoration: line-through; }

        @keyframes flicker {
            0% { opacity: 0.7; } 100% { opacity: 1; }
        }

        /* 籤詩內容 */
        #poem-display {
            font-size: 1.2rem;
            border: 1px solid var(--pip-green);
            padding: 25px;
            min-height: 100px;
            text-align: center;
            background: rgba(24, 255, 98, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button {
            width: 100%;
            background: transparent;
            color: var(--pip-green);
            border: 2px solid var(--pip-green);
            padding: 15px;
            margin-top: 15px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover { background: var(--pip-green); color: var(--pip-bg); }
        button:disabled { border-color: var(--pip-dim); color: var(--pip-dim); cursor: wait; }

        .blink { animation: blink-anim 1s steps(2, start) infinite; }
        @keyframes blink-anim { to { visibility: hidden; } }
    </style>
</head>
<body>

<div id="lock-screen">
    <div id="logo-container" class="rotate-slow">
        <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" stroke-width="2"/>
            <path d="M50 20V80M20 50H80" stroke-width="4"/>
            </svg>
    </div>
    <div id="status-text">> SYSTEM_LOCKED</div>
    <p class="blink" style="font-size: 0.8rem;">[ 感應 NFC 標籤以授權 ]</p>
    
    <div onclick="unlock()" style="cursor:pointer; font-size: 9px; opacity: 0.2; margin-top: 20px;">[ ADMIN_OVERRIDE ]</div>
</div>

<div class="terminal-window" id="app">
    <div class="header">
        <span>VAULT-TEC MONITOR</span>
        <span id="terminal-time">V.3.11</span>
    </div>
    
    <div class="ranks-grid" id="ranks-container">
        </div>

    <div id="poem-display">WAINTING FOR COMMAND...</div>

    <button id="draw-btn" onclick="executeDraw()">[ EXECUTE RANDOM_LUCK.EXE ]</button>
</div>

<script>
    const rarity = [
        { name: "SSSR", w: 1, c: "sssr" },
        { name: "SSR",  w: 4, c: "ssr"  },
        { name: "SP",   w: 5, c: "sp"   },
        { name: "SR",   w: 15, c: ""    },
        { name: "R",    w: 45, c: ""    },
        { name: "N",    w: 30, c: ""    }
    ];
    const categories = ["LOVE", "WEALTH", "CAREER", "TRAVEL", "HEALTH", "OVERALL"];

    function unlock() {
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
    }

    // NFC 監聽
    if ('NDEFReader' in window) {
        const ndef = new NDEFReader();
        ndef.scan().then(() => {
            ndef.onreading = () => unlock();
        }).catch(err => console.log("NFC not available"));
    }

    async function executeDraw() {
        const btn = document.getElementById('draw-btn');
        const logo = document.getElementById('logo-container');
        const poemBox = document.getElementById('poem-display');
        
        // 1. 進入高速旋轉狀態
        document.getElementById('lock-screen').style.display = 'flex'; // 暫時顯示 Logo 回來旋轉
        document.getElementById('app').style.display = 'none';
        logo.classList.remove('rotate-slow');
        logo.classList.add('rotate-fast');
        document.getElementById('status-text').innerText = "> OVERLOADING...";

        try {
            const res = await fetch('messages.json');
            const poems = await res.json();
            
            // 模擬計算時間 (2秒)
            await new Promise(r => setTimeout(r, 2000));

            // 2. 計算結果
            let rankHtml = '';
            categories.forEach(cat => {
                const rand = Math.random() * 100;
                let sum = 0, sel = rarity[rarity.length-1];
                for(let r of rarity) {
                    sum += r.w;
                    if(rand <= sum) { sel = r; break; }
                }
                rankHtml += `<div class="rank-item"><span>${cat}:</span><span class="tag ${sel.c}">${sel.name}</span></div>`;
            });

            const lucky = poems[Math.floor(Math.random() * poems.length)];
            const text = typeof lucky === 'string' ? lucky : lucky.text;

            // 3. 揭曉結果
            document.getElementById('ranks-container').innerHTML = rankHtml;
            poemBox.innerText = "> " + text;
            
            // 回到終端機畫面
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            logo.classList.remove('rotate-fast');
            logo.classList.add('rotate-slow');

        } catch (e) {
            poemBox.innerText = "> ERROR: DATA_CORRUPTED";
        }
    }
</script>
</body>
</html>

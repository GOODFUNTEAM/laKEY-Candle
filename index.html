<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>laKEY-Candle: TERMINAL</title>
    <style>
        :root {
            --pip-green: #18ff62;
            --pip-bg: #0c120c;
            --pip-dim: #063d17;
        }

        body {
            background-color: var(--pip-bg);
            color: var(--pip-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-transform: uppercase;
            overflow: hidden;
        }

        /* 螢幕掃描線 */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 100;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .container {
            width: 90%;
            max-width: 450px;
            text-align: center;
            z-index: 10;
        }

        /* LOGO 視覺控制 */
        #logo-svg {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            transition: all 0.5s ease;
        }

        .spin-slow { animation: spin 10s linear infinite; opacity: 0.6; }
        .spin-fast { animation: spin 0.15s linear infinite !important; filter: drop-shadow(0 0 15px var(--pip-green)); opacity: 1; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .ui-box {
            border: 2px solid var(--pip-green);
            padding: 20px;
            background: rgba(24, 255, 98, 0.02);
            box-shadow: 0 0 20px var(--pip-dim);
            min-height: 200px;
        }

        .status-msg { margin-bottom: 20px; letter-spacing: 2px; height: 1.2rem; }
        .blink { animation: blink-anim 1s steps(2, start) infinite; }
        @keyframes blink-anim { to { visibility: hidden; } }

        #result-area { display: none; margin-top: 10px; border-top: 1px solid var(--pip-dim); padding-top: 20px; }
        .ranks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.8rem; text-align: left; }
        .rank-item { border: 1px solid var(--pip-dim); padding: 5px; display: flex; justify-content: space-between; }
        .tag-sssr { background: var(--pip-green); color: var(--pip-bg); font-weight: bold; box-shadow: 0 0 5px var(--pip-green); }
        
        #poem-text { font-size: 1.2rem; margin: 20px 0; line-height: 1.4; color: #fff; text-shadow: 0 0 5px var(--pip-green); font-weight: bold; }

        /* 裝飾性線條 */
        .decor-line { height: 1px; background: var(--pip-dim); margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="logo-wrapper">
        <svg id="logo-svg" class="spin-slow" viewBox="0 0 100 100" fill="none" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" stroke-width="2"/>
            <path d="M50 20V80M20 50H80" stroke-width="2"/>
            </svg>
    </div>

    <div class="ui-box">
        <div class="status-msg" id="main-status">> SYSTEM_WAITING</div>
        <div id="instruction" class="blink">PLEASE_INSERT_TOKEN (NFC)</div>
        
        <div id="result-area">
            <div class="ranks-grid" id="ranks-container"></div>
            <div class="decor-line"></div>
            <div id="poem-text"></div>
            <div class="decor-line"></div>
        </div>
    </div>

    <p style="margin-top: 20px; font-size: 10px; opacity: 0.3; cursor: pointer;" onclick="executeDraw()">[ MANUAL_OVERRIDE ]</p>
</div>

<script>
    const rarity = [
        { name: "SSSR", w: 1, c: "tag-sssr" },
        { name: "SSR",  w: 4, c: "" },
        { name: "SP",   w: 5, c: "" },
        { name: "SR",   w: 15, c: "" },
        { name: "R",    w: 45, c: "" },
        { name: "N",    w: 30, c: "" }
    ];
    const categories = ["LOVE", "WEALTH", "CAREER", "TRAVEL", "HEALTH", "OVERALL"];

    // 核心邏輯：抽籤程式
    async function executeDraw() {
        const logo = document.getElementById('logo-svg');
        const status = document.getElementById('main-status');
        const instruction = document.getElementById('instruction');
        const resultArea = document.getElementById('result-area');

        // 視覺：高速旋轉與狀態切換
        logo.className = 'spin-fast';
        status.innerText = "> AUTHENTICATING... RUNNING_LUCK.EXE";
        instruction.style.display = 'none';
        resultArea.style.display = 'none';

        try {
            const res = await fetch('messages.json');
            const poems = await res.json();

            // 模擬地堡終端機讀取延遲
            await new Promise(r => setTimeout(r, 2000));

            let rankHtml = '';
            categories.forEach(cat => {
                const rand = Math.random() * 100;
                let sum = 0, sel = rarity[rarity.length-1];
                for(let r of rarity) {
                    sum += r.w;
                    if(rand <= sum) { sel = r; break; }
                }
                rankHtml += `<div class="rank-item"><span>${cat}</span><span class="${sel.c}">${sel.name}</span></div>`;
            });

            const lucky = poems[Math.floor(Math.random() * poems.length)];
            const poemDisplay = typeof lucky === 'string' ? lucky : (lucky.text || lucky.content);

            // 渲染結果
            document.getElementById('ranks-container').innerHTML = rankHtml;
            document.getElementById('poem-text').innerText = poemDisplay;
            
            // 結束效果
            logo.className = 'spin-slow';
            status.innerText = "> ANALYSIS_COMPLETE";
            resultArea.style.display = 'block';

        } catch (e) {
            status.innerText = "> ERR: DB_READ_FAILURE";
            logo.className = 'spin-slow';
        }
    }

    // 初始化檢查：偵測網址是否有 Token 參數
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        // 如果網址帶有 ?auth=authorized (NFC感應後會自動帶入)
        if (urlParams.get('auth') === 'authorized') {
            executeDraw();
        }
    };

    // 原生 Web NFC 監聽 (Android Chrome 支援)
    if ('NDEFReader' in window) {
        const ndef = new NDEFReader();
        ndef.scan().then(() => {
            ndef.onreading = () => {
                executeDraw();
            };
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Draw - GOODFUN TEAM</title>
    <style>
        :root {
            --win-gray: #c0c0c0;
            --win-blue: #000080;
            --win-border-light: #ffffff;
            --win-border-dark: #808080;
        }

        body {
            background-color: #008080; /* Win98 經典綠色背景 */
            font-family: "Microsoft JhengHei", "PMingLiU", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Windows 98 視窗樣式 */
        .window {
            width: 350px;
            background: var(--win-gray);
            border: 2px solid;
            border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            box-shadow: 1px 1px 0 0 #000;
            padding: 2px;
        }

        .title-bar {
            background: var(--win-blue);
            color: white;
            padding: 3px 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
        }

        .window-body {
            padding: 15px;
        }

        /* 運勢等級樣式 */
        #ranks-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .rank-item {
            background: #eee;
            border: 1px inset var(--win-border-light);
            padding: 5px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        /* 等級顏色與動畫 */
        .rank-tag { font-weight: bold; padding: 0 4px; }
        .rank-sssr { background: linear-gradient(45deg, #ffd700, #fff, #ffd700); animation: shine 1.5s infinite; color: #000; border: 1px solid #000; }
        .rank-ssr { background: #ff00ff; color: #fff; }
        .rank-sp { background: #000; color: #0ff; text-shadow: 1px 0 #f0f; animation: glitch 0.3s infinite; }
        .rank-sr { background: #ffa500; color: #fff; }
        .rank-r { background: #fff; color: #333; }
        .rank-n { background: #888; color: #ccc; }

        @keyframes shine {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            50% { transform: translate(-1px, 1px); }
            100% { transform: translate(1px, -1px); }
        }

        /* 籤詩顯示區域 */
        #poem-display {
            background: white;
            border: 2px inset var(--win-border-dark);
            min-height: 80px;
            padding: 15px;
            margin: 10px 0;
            font-size: 16px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.5;
        }

        button {
            width: 100%;
            padding: 8px;
            background: var(--win-gray);
            border: 2px solid;
            border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }

        button:active {
            border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
        }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <span>Lucky_Draw.exe</span>
        <span style="cursor:default">X</span>
    </div>
    <div class="window-body">
        <div id="ranks-grid">
            <div class="rank-item"><span>戀愛</span><span class="rank-tag" id="rank-0">-</span></div>
            <div class="rank-item"><span>金錢</span><span class="rank-tag" id="rank-1">-</span></div>
            <div class="rank-item"><span>工作</span><span class="rank-tag" id="rank-2">-</span></div>
            <div class="rank-item"><span>旅行</span><span class="rank-tag" id="rank-3">-</span></div>
            <div class="rank-item"><span>健康</span><span class="rank-tag" id="rank-4">-</span></div>
            <div class="rank-item"><span>整體</span><span class="rank-tag" id="rank-5">-</span></div>
        </div>

        <div id="poem-display">點擊按鈕獲取今日運勢...</div>

        <button onclick="startLuckyDraw()">[ 執行抽籤 ]</button>
    </div>
</div>

<script>
    const raritySettings = [
        { rank: "SSSR", weight: 1,  class: "rank-sssr" },
        { rank: "SSR",  weight: 4,  class: "rank-ssr"  },
        { rank: "SP",   weight: 5,  class: "rank-sp"   },
        { rank: "SR",   weight: 15, class: "rank-sr"   },
        { rank: "R",    weight: 45, class: "rank-r"    },
        { rank: "N",    weight: 30, class: "rank-n"    }
    ];

    async function startLuckyDraw() {
        const btn = document.querySelector('button');
        btn.disabled = true;
        btn.innerText = "讀取中...";

        try {
            // 讀取 JSON
            const response = await fetch('messages.json');
            const poems = await response.json();
            
            // 1. 計算六項等級
            for (let i = 0; i < 6; i++) {
                const rand = Math.random() * 100;
                let sum = 0;
                let selected = raritySettings[raritySettings.length - 1];

                for (const r of raritySettings) {
                    sum += r.weight;
                    if (rand <= sum) {
                        selected = r;
                        break;
                    }
                }
                
                const el = document.getElementById(`rank-${i}`);
                el.innerText = selected.rank;
                el.className = `rank-tag ${selected.class}`;
            }

            // 2. 隨機抽取一條籤詩
            // 支援 JSON 為陣列格式 ["A", "B"] 或物件格式 [{"text":"A"}]
            const randomEntry = poems[Math.floor(Math.random() * poems.length)];
            const poemContent = typeof randomEntry === 'string' ? randomEntry : (randomEntry.text || randomEntry.content);
            
            document.getElementById('poem-display').innerText = poemContent;

        } catch (error) {
            document.getElementById('poem-display').innerText = "找不到 messages.json，請確認檔案路徑！";
            console.error(error);
        } finally {
            btn.disabled = false;
            btn.innerText = "[ 重新抽籤 ]";
        }
    }
</script>

</body>
</html>

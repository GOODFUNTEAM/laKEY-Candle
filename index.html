<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Candle – GOODFUN TEAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        /* --- CSS 極致排版：確保 Full Screen 且不可捲動 --- */
        :root {
            --paper: #F4F2E9;   /* 更復古的紙張色 */
            --blue: #0044CC;    /* 傳統印刷藍 */
            --red: #D30000;     /* 傳統印刷紅 */
            --ink: #111111;
        }

        /* 鎖定禁止縮放與捲動 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: #111;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden; /* 強制不捲動 */
            font-family: sans-serif; /* 預設系統粗體 */
        }

        /* 鎖定畫面 */
        #lock-screen { 
            text-align: center; color: #fff; z-index: 100; font-family: 'Noto Serif TC', serif; 
            display: flex; flex-direction: column; align-items: center; 
        }
        #lock-screen h2 { font-size: 2rem; letter-spacing: 8px; margin-bottom: 15px; }

        /* --- 日曆主體：Full Screen 排版關鍵 --- */
        .calendar-paper {
            background-color: var(--paper);
            width: 92vw; max-width: 390px; height: 94vh; /* 使用高度單位固定 */
            padding: 10px; border: 4px solid var(--ink); /* 粗邊框 */
            display: none; /* 由 JS 驗證後顯示 flex */
            flex-direction: column;
            box-shadow: 12px 12px 0px #333;
            position: relative;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* --- 頂部導覽：IG 超連結版 --- */
        .ig-link {
            text-decoration: none; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 6px double var(--ink); /* 雙實線 */
            padding: 2px 2px 8px 2px; margin-bottom: 8px; /* 緊湊 */
            color: var(--ink); cursor: pointer; transition: opacity 0.3s;
        }
        .ig-link:active { opacity: 0.7; } /* 按下時的視覺回饋 */
        .team-name { font-family: 'Noto Serif TC', serif; font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; }
        .logo-img { width: 42px; height: 42px; object-fit: contain; }

        /* --- 日期區塊：極大化 --- */
        .date-box {
            border: 3px solid var(--blue);
            flex: 1; /* 關鍵：佔用剩餘空間的主力 */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; margin-bottom: 8px; background: #fff;
        }
        .month-tag { position: absolute; top: 8px; left: 10px; color: var(--blue); font-weight: 900; font-size: 2.2rem; }
        .day-num { 
            font-size: 14rem; /* 極大，確保視覺衝擊 */
            font-weight: 900; color: var(--blue); 
            line-height: 0.8; letter-spacing: -10px; margin-top: 15px;
        }
        .week-bar {
            width: 100%; background-color: var(--blue); color: white;
            text-align: center; font-size: 2.4rem; font-weight: 900;
            padding: 8px 0; letter-spacing: 20px; margin-top: auto;
        }

        /* --- 資訊格線 --- */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; border: 2px solid var(--ink); margin-bottom: 8px; }
        .cell { border-right: 2px solid var(--ink); padding: 5px; text-align: center; }
        .cell:last-child { border-right: none; }
        .cell-label { color: var(--red); font-weight: 900; font-size: 0.8rem; display: block; border-bottom: 1px solid var(--ink); margin-bottom: 2px; }
        .cell-val { font-weight: 900; font-size: 1.15rem; color: var(--ink); }

        /* --- 宜忌區 --- */
        .yiji-wrap { display: grid; grid-template-columns: 1fr 1fr; border: 3px solid var(--ink); background: #fff; }
        .yiji-box { padding: 6px; text-align: center; height: 95px; } /* 固定高度比例 */
        .yiji-box.yi { border-right: 3px solid var(--ink); }
        .yiji-head { font-weight: 900; font-size: 1.7rem; margin-bottom: 4px; display: block; }
        .yi .yiji-head { color: var(--red); }
        .yiji-list { font-size: 1.25rem; font-weight: 900; list-style: none; line-height: 1.3; }

        /* --- 籤詩：支援 \n 換行 --- */
        .maxim {
            margin: 10px 0; padding: 12px 10px; border: 2px dashed var(--red);
            text-align: center; font-family: 'Noto Serif TC', serif; font-size: 1.15rem; font-weight: 800;
            white-space: pre-line; min-height: 70px; /* 固定高度比例 */
            display: flex; align-items: center; justify-content: center;
        }

        /* --- 許願區 --- */
        .wish-zone { display: flex; border: 3px solid var(--red); background: white; margin-bottom: 5px; }
        .wish-in { flex: 1; border: none; padding: 10px; font-weight: bold; outline: none; font-size: 1rem; }
        .wish-go { background: var(--red); color: white; border: none; padding: 0 15px; font-weight: 900; font-size: 1.1rem; }

        /* 頁尾版本號 */
        .footer { text-align: center; font-size: 0.65rem; opacity: 0.6; font-weight: bold; color: var(--ink); margin-top: auto; }

        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2>LUCKY CANDLE</h2>
        <div id="lock-msg">🔒 感應解鎖今日運勢</div>
    </div>

    <div class="calendar-paper" id="main-calendar">
        
        <a href="https://www.instagram.com/goodfun_team/" target="_blank" class="ig-link">
            <span class="team-name">孤芳小隊</span>
            <img src="logo_8bit_green.svg" alt="IG" class="logo-img" onerror="this.style.display='none'">
            <span class="team-name" style="font-size: 0.7rem; text-align: right; letter-spacing: 0;">GOODFUN<br>TEAM</span>
        </a>

        <div class="date-box">
            <div class="month-tag" id="m-tag">--月</div>
            <div class="day-num" id="d-tag">--</div>
            <div class="week-bar" id="w-tag">星期-</div>
        </div>

        <div class="info-grid">
            <div class="cell"><span class="cell-label">地點</span><div class="cell-val" id="loc-val">同步中</div></div>
            <div class="cell"><span class="cell-label">運勢</span><div class="cell-val" id="rank-val" style="color:var(--red);">--</div></div>
            <div class="cell"><span class="cell-label">氣溫</span><div class="cell-val" id="temp-val">--</div></div>
        </div>

        <div class="yiji-wrap">
            <div class="yiji-box yi"><span class="yiji-head">宜</span><ul class="yiji-list" id="yi-list"></ul></div>
            <div class="yiji-box ji"><span class="yiji-head">忌</span><ul class="yiji-list" id="ji-list"></ul></div>
        </div>

        <div class="maxim" id="maxim-text">讀取中...</div>

        <div id="wish-container">
            <div class="wish-zone">
                <input type="text" id="wish-input" class="wish-in" placeholder="寫下願望..." maxlength="12">
                <button class="wish-go" onclick="setWish()">點燃</button>
            </div>
        </div>

        <div class="footer">GOODFUN TEAM // LUCKY CANDLE V9.0</div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>laKEY-Candle: TERMINAL</title>
    <style>
        :root {
            --pip-green: #18ff62;
            --pip-bg: #0c120c;
            --pip-dim: #063d17;
        }

        body {
            background-color: var(--pip-bg);
            color: var(--pip-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-transform: uppercase;
            overflow: hidden;
        }

        /* 螢幕掃描線 */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 100;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .container {
            width: 90%;
            max-width: 450px;
            text-align: center;
            z-index: 10;
        }

        #logo-svg {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            transition: all 0.5s ease;
        }

        .spin-slow { animation: spin 10s linear infinite; opacity: 0.5; }
        .spin-fast { animation: spin 0.15s linear infinite !important; filter: drop-shadow(0 0 15px var(--pip-green)); opacity: 1; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .ui-box {
            border: 2px solid var(--pip-green);
            padding: 20px;
            background: rgba(24, 255, 98, 0.02);
            box-shadow: 0 0 20px var(--pip-dim);
            min-height: 220px;
        }

        .status-msg { margin-bottom: 15px; letter-spacing: 2px; }
        .blink { animation: blink-anim 1s steps(2, start) infinite; }
        @keyframes blink-anim { to { visibility: hidden; } }

        #result-area { display: none; margin-top: 10px; border-top: 1px solid var(--pip-dim); padding-top: 20px; }
        .ranks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.75rem; text-align: left; }
        .rank-item { border: 1px solid var(--pip-dim); padding: 4px; display: flex; justify-content: space-between; }
        .tag-sssr { background: var(--pip-green); color: var(--pip-bg); font-weight: bold; }
        
        #poem-text { font-size: 1.1rem; margin: 15px 0; line-height: 1.4; color: #fff; text-shadow: 0 0 5px var(--pip-green); }

        .footer-note { font-size: 9px; opacity: 0.2; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="logo-wrapper">
        <svg id="logo-svg" class="spin-slow" viewBox="0 0 100 100" fill="none" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" stroke-width="2"/>
            <path d="M50 20V80M20 50H80" stroke-width="2"/>
        </svg>
    </div>

    <div class="ui-box">
        <div class="status-msg" id="main-status">> SYSTEM_LOCKED</div>
        <div id="instruction" class="blink">請感應實體燭籤解鎖</div>
        
        <div id="result-area">
            <div class="ranks-grid" id="ranks-container"></div>
            <div id="poem-text">讀取中...</div>
            <div style="font-size: 9px; color: var(--pip-dim);">SESSION_ACTIVE: 隨時感應以重新分析</div>
        </div>
    </div>
    
    <div class="footer-note">VAULT-TEC PROTOCOL // GOODFUN TEAM</div>
</div>

<script>
    const MASTER_SERIAL = "04:27:af:1f:c8:2a:81"; // Android 硬體鎖
    const MASTER_KEY = "GOODFUN_TOKEN_0427";     // iPhone 網址鎖

    const rarity = [{name:"SSSR",w:1,c:"tag-sssr"},{name:"SSR",w:4,c:""},{name:"SP",w:5,c:""},{name:"SR",w:15,c:""},{name:"R",w:45,c:""},{name:"N",w:30,c:""}];
    const categories = ["LOVE", "WEALTH", "CAREER", "TRAVEL", "HEALTH", "OVERALL"];

    async function executeDraw() {
        // 如果是帶 Key 進來的，立即洗掉網址參數，不留痕跡
        if (window.location.search.includes('key=')) {
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        const logo = document.getElementById('logo-svg');
        const status = document.getElementById('main-status');
        const instruction = document.getElementById('instruction');
        const resultArea = document.getElementById('result-area');

        logo.className = 'spin-fast';
        status.innerText = "> ACCESS_GRANTED. RUNNING...";
        instruction.style.display = 'none';
        resultArea.style.display = 'none';

        try {
            const res = await fetch('messages.json');
            const poems = await res.json();
            await new Promise(r => setTimeout(r, 2000));

            let rankHtml = '';
            categories.forEach(cat => {
                const rand = Math.random() * 100;
                let sum = 0, sel = rarity[rarity.length-1];
                for(let r of rarity) {
                    sum += r.w;
                    if(rand <= sum) { sel = r; break; }
                }
                rankHtml += `<div class="rank-item"><span>${cat}</span><span class="${sel.c}">${sel.name}</span></div>`;
            });

            const lucky = poems[Math.floor(Math.random() * poems.length)];
            document.getElementById('ranks-container').innerHTML = rankHtml;
            document.getElementById('poem-text').innerText = typeof lucky === 'string' ? lucky : lucky.text;
            
            logo.className = 'spin-slow';
            status.innerText = "> ANALYSIS_COMPLETE";
            resultArea.style.display = 'block';
            instruction.style.display = 'block';
            instruction.innerText = "感應標籤以再次抽籤";

        } catch (e) {
            status.innerText = "> ERR: DB_OFFLINE";
        }
    }

    // --- 初始化與監聽邏輯 ---
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        // iPhone 方案：偵測網址 Key
        if (urlParams.get('key') === MASTER_KEY) {
            executeDraw();
        }
    };

    // Android 方案：偵測硬體序號
    if ('NDEFReader' in window) {
        const ndef = new NDEFReader();
        ndef.scan().then(() => {
            ndef.onreading = (event) => {
                const sn = event.serialNumber.toLowerCase();
                if (sn === MASTER_SERIAL) {
                    executeDraw();
                }
            };
        });
    }
</script>
</body>
</html>

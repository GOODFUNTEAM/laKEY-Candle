<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>laKEY-Candle: TERMINAL</title>
    <style>
        :root {
            --pip-green: #18ff62;
            --pip-bg: #0c120c;
            --pip-dim: #063d17;
        }

        body {
            background-color: var(--pip-bg);
            color: var(--pip-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-transform: uppercase;
            overflow: hidden;
        }

        /* 掃描線特效 */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 100;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .container {
            width: 90%;
            max-width: 450px;
            text-align: center;
            z-index: 10;
        }

        /* LOGO 旋轉控制 */
        #logo-svg {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            transition: all 0.5s ease;
        }

        .spin-slow { animation: spin 10s linear infinite; opacity: 0.6; }
        .spin-fast { animation: spin 0.15s linear infinite !important; filter: drop-shadow(0 0 15px var(--pip-green)); opacity: 1; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 終端機 UI */
        .ui-box {
            border: 2px solid var(--pip-green);
            padding: 20px;
            background: rgba(24, 255, 98, 0.02);
            box-shadow: 0 0 20px var(--pip-dim);
        }

        .status-msg { margin-bottom: 20px; letter-spacing: 2px; height: 1.2rem; }
        .blink { animation: blink-anim 1s steps(2, start) infinite; }
        @keyframes blink-anim { to { visibility: hidden; } }

        /* 運勢顯示區 (預設隱藏) */
        #result-area { display: none; margin-top: 20px; border-top: 1px solid var(--pip-green); padding-top: 20px; }
        .ranks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.8rem; text-align: left; }
        .rank-item { border: 1px solid var(--pip-dim); padding: 5px; display: flex; justify-content: space-between; }
        .tag-sssr { background: var(--pip-green); color: var(--pip-bg); font-weight: bold; }
        
        #poem-text { font-size: 1.2rem; margin: 20px 0; line-height: 1.4; color: #fff; text-shadow: 0 0 5px var(--pip-green); }

    </style>
</head>
<body>

<div class="container">
    <div id="logo-wrapper">
        <svg id="logo-svg" class="spin-slow" viewBox="0 0 100 100" fill="none" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" stroke-width="2"/>
            <path d="M50 20V80M20 50H80" stroke-width="2"/>
        </svg>
    </div>

    <div class="ui-box">
        <div class="status-msg" id="main-status">> SYSTEM IDLE</div>
        <div id="instruction" class="blink">請感應燭籤 TOKEN 啟動</div>
        
        <div id="result-area">
            <div class="ranks-grid" id="ranks-container"></div>
            <div id="poem-text"></div>
        </div>
    </div>
    
    <button onclick="simulateNFC()" style="margin-top:50px; background:none; border:1px solid var(--pip-dim); color:var(--pip-dim); font-size:9px; cursor:pointer;">[ 模擬 NFC 感應 ]</button>
</div>

<script>
    const rarity = [
        { name: "SSSR", w: 1, c: "tag-sssr" },
        { name: "SSR",  w: 4, c: "" },
        { name: "SP",   w: 5, c: "" },
        { name: "SR",   w: 15, c: "" },
        { name: "R",    w: 45, c: "" },
        { name: "N",    w: 30, c: "" }
    ];
    const categories = ["LOVE", "WEALTH", "CAREER", "TRAVEL", "HEALTH", "OVERALL"];
    let isProcessing = false;

    // 核心功能：當 NFC 被感應時觸發
    async function onTokenDetected() {
        if (isProcessing) return; // 防止重複感應
        isProcessing = true;

        const logo = document.getElementById('logo-svg');
        const status = document.getElementById('main-status');
        const instruction = document.getElementById('instruction');
        const resultArea = document.getElementById('result-area');

        // 1. 視覺切換：啟動高速運轉
        logo.className = 'spin-fast';
        status.innerText = "> TOKEN AUTHORIZED. CALCULATING...";
        instruction.style.display = 'none';
        resultArea.style.display = 'none';

        try {
            // 讀取你的 100 條籤詩
            const res = await fetch('messages.json');
            const poems = await res.json();

            // 模擬地堡終端機計算時間 (1.5秒)
            await new Promise(r => setTimeout(r, 1500));

            // 2. 計算六大等級
            let rankHtml = '';
            categories.forEach(cat => {
                const rand = Math.random() * 100;
                let sum = 0, sel = rarity[rarity.length-1];
                for(let r of rarity) {
                    sum += r.w;
                    if(rand <= sum) { sel = r; break; }
                }
                rankHtml += `<div class="rank-item"><span>${cat}</span><span class="${sel.c}">${sel.name}</span></div>`;
            });

            // 3. 隨機籤詩
            const lucky = poems[Math.floor(Math.random() * poems.length)];
            const poemDisplay = typeof lucky === 'string' ? lucky : (lucky.text || lucky.content);

            // 4. 顯示結果
            document.getElementById('ranks-container').innerHTML = rankHtml;
            document.getElementById('poem-text').innerText = poemDisplay;
            
            // 5. 回復狀態
            logo.className = 'spin-slow';
            status.innerText = "> ANALYSIS COMPLETE";
            resultArea.style.display = 'block';
            instruction.style.display = 'block';
            instruction.innerText = "感應標籤以重新分析";

        } catch (e) {
            status.innerText = "> ERROR: DATA_LOSS";
        } finally {
            isProcessing = false;
        }
    }

    // 真正的 NFC 監聽器
    if ('NDEFReader' in window) {
        const ndef = new NDEFReader();
        ndef.scan().then(() => {
            ndef.onreading = (event) => {
                // 檢查是否為專屬網址 Token
                onTokenDetected();
            };
        });
    }

    // 開發用模擬函數
    function simulateNFC() {
        onTokenDetected();
    }
</script>
</body>
</html>

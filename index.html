<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>laKEY-Candle: TERMINAL</title>
    <style>
        :root {
            --pip-green: #18ff62;
            --pip-bg: #0c120c;
            --pip-dim: #063d17;
        }

        body {
            background-color: var(--pip-bg);
            color: var(--pip-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-transform: uppercase;
            overflow: hidden;
        }

        /* 螢幕掃描線視覺 */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 100;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .container { width: 90%; max-width: 450px; text-align: center; z-index: 10; }

        /* LOGO 動畫 */
        #logo-svg { width: 150px; height: 150px; margin-bottom: 20px; transition: all 0.5s ease; }
        .spin-slow { animation: spin 10s linear infinite; opacity: 0.5; }
        .spin-fast { animation: spin 0.15s linear infinite !important; filter: drop-shadow(0 0 15px var(--pip-green)); opacity: 1; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .ui-box {
            border: 2px solid var(--pip-green);
            padding: 20px;
            background: rgba(24, 255, 98, 0.02);
            box-shadow: 0 0 20px var(--pip-dim);
            min-height: 240px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #main-status { margin-bottom: 10px; font-weight: bold; }
        .blink { animation: blink-anim 1s steps(2, start) infinite; }
        @keyframes blink-anim { to { visibility: hidden; } }

        /* 結果區 */
        #result-area { display: none; margin-top: 15px; border-top: 1px solid var(--pip-dim); padding-top: 15px; }
        .ranks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.7rem; text-align: left; }
        .rank-item { border: 1px solid var(--pip-dim); padding: 4px; display: flex; justify-content: space-between; }
        .tag-sssr { background: var(--pip-green); color: var(--pip-bg); font-weight: bold; }
        #poem-text { font-size: 1.2rem; margin: 15px 0; color: #fff; text-shadow: 0 0 5px var(--pip-green); }
    </style>
</head>
<body>

<div class="container">
    <div id="logo-wrapper">
        <svg id="logo-svg" class="spin-slow" viewBox="0 0 100 100" fill="none" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" stroke-width="2"/>
            <path d="M50 20V80M20 50H80" stroke-width="2"/>
        </svg>
    </div>

    <div class="ui-box">
        <div id="main-status">> SYSTEM_LOCKED</div>
        <div id="instruction" class="blink">HARDWARE_KEY_REQUIRED</div>
        
        <div id="result-area">
            <div class="ranks-grid" id="ranks-container"></div>
            <div id="poem-text">正在讀取地堡資料...</div>
            <p style="font-size: 9px; color: var(--pip-dim); margin-top: 10px;">AUTH_TOKEN: 04:27:AF_VERIFIED</p>
        </div>
    </div>
</div>

<script>
    // 密鑰設定
    const MASTER_KEY = "GOODFUN_TOKEN_0427";

    async function executeDraw() {
        // --- 核心步驟：立即清理網址列，別人看不到你的 Key ---
        if (window.location.search.includes('key=')) {
            const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.replaceState({}, document.title, cleanUrl);
        }

        const logo = document.getElementById('logo-svg');
        const status = document.getElementById('main-status');
        const instruction = document.getElementById('instruction');
        const resultArea = document.getElementById('result-area');

        // 啟動動畫
        logo.className = 'spin-fast';
        status.innerText = "> ACCESS_GRANTED";
        instruction.innerText = "CALCULATING_LUCK...";
        
        try {
            const res = await fetch('messages.json');
            const poems = await res.json();

            // 模擬系統讀取感
            await new Promise(r => setTimeout(r, 2000));

            // 計算運勢
            const rarity = [{n:"SSSR",w:1,c:"tag-sssr"},{n:"SSR",w:4,c:""},{n:"SP",w:5,c:""},{n:"SR",w:15,c:""},{n:"R",w:45,c:""},{n:"N",w:30,c:""}];
            const cats = ["LOVE", "WEALTH", "CAREER", "TRAVEL", "HEALTH", "OVERALL"];
            
            let rankHtml = '';
            cats.forEach(cat => {
                const rand = Math.random() * 100;
                let sum = 0, sel = rarity[5];
                for(let r of rarity) {
                    sum += r.w;
                    if(rand <= sum) { sel = r; break; }
                }
                rankHtml += `<div class="rank-item"><span>${cat}</span><span class="${sel.c}">${sel.n}</span></div>`;
            });

            const lucky = poems[Math.floor(Math.random() * poems.length)];
            
            // 顯示結果
            document.getElementById('ranks-container').innerHTML = rankHtml;
            document.getElementById('poem-text').innerText = typeof lucky === 'string' ? lucky : lucky.text;
            
            logo.className = 'spin-slow';
            status.innerText = "> ANALYSIS_COMPLETE";
            instruction.style.display = 'none';
            resultArea.style.display = 'block';

        } catch (e) {
            status.innerText = "> ERR: DATA_CORRUPTED";
        }
    }

    // 檢查網址是否有鑰匙
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('key') === MASTER_KEY) {
            executeDraw();
        } else {
            // 如果沒有 Key 或 Key 錯誤，維持鎖定狀態
            console.log("Unauthorized Access Attempt");
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCKY CANDLE - 今日日曆</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F5F1E8;
            --red-color: #B00020;
            --text-color: #111111;
            --line-color: #DDDDDD;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #E0DDD5;
            color: var(--text-color);
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 鎖定畫面 */
        #lock-screen { text-align: center; font-family: 'Noto Serif TC', serif; color: var(--red-color); z-index: 10; padding: 20px; }

        /* 日曆主容器 */
        .calendar-wrapper {
            width: 90%;
            max-width: 420px;
            height: 85vh;
            position: relative;
            display: none;
            perspective: 1200px;
        }

        /* 日曆主體內容 */
        .calendar-card {
            background-color: var(--bg-color);
            width: 100%;
            height: 100%;
            padding: 30px 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 1px solid #D1CDC2;
            overflow-y: auto;
            position: absolute;
            top: 0; left: 0;
            scrollbar-width: none; /* 隱藏捲軸 */
        }
        .calendar-card::-webkit-scrollbar { display: none; }

        /* 撕紙層 (封面) */
        .tear-off-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            background-image: repeating-linear-gradient(var(--bg-color) 0px, var(--bg-color) 20px, #f2eee2 21px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #D1CDC2;
            cursor: pointer;
            transition: transform 0.9s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.6s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* 撕開動畫：向上飛出並旋轉 */
        .tear-off-layer.ripped {
            transform: translateY(-130%) rotate(-8deg);
            opacity: 0;
            pointer-events: none;
        }

        .cover-title { font-family: 'Noto Serif TC', serif; font-size: 2.8rem; color: var(--red-color); font-weight: 900; margin: 10px 0; letter-spacing: 2px; }
        .cover-hint { font-size: 0.85rem; letter-spacing: 4px; color: #888; border: 1.5px solid #888; padding: 6px 20px; margin-top: 30px; border-radius: 50px; }

        /* 內部內容樣式 */
        .header-brand { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; letter-spacing: 5px; border-bottom: 2px solid var(--text-color); padding-bottom: 8px; margin-bottom: 20px; text-align: center; }
        .location-tag { display: inline-block; background-color: var(--red-color); color: #FFF; font-size: 0.75rem; padding: 3px 12px; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; }
        .date-main { font-family: 'Noto Serif TC', serif; font-size: 4.5rem; font-weight: 900; color: var(--red-color); line-height: 1; margin: 5px 0; }
        .weekday-label { font-size: 1.2rem; letter-spacing: 3px; border-top: 1.5px solid var(--text-color); display: inline-block; padding: 5px 15px; margin-top: 10px; font-weight: bold; }
        
        .divider { border-top: 1px solid var(--line-color); margin: 25px 0; }
        .section-title { font-size: 0.8rem; color: #999; margin-bottom: 12px; text-align: center; letter-spacing: 3px; }

        .message-box { font-family: 'Noto Serif TC', serif; font-size: 1.7rem; line-height: 1.5; text-align: center; font-weight: 700; min-height: 80px; display: flex; align-items: center; justify-content: center; }

        .rank-label-large { font-size: 5.5rem; font-weight: 900; color: var(--red-color); line-height: 1; text-align: center; margin-bottom: 5px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--line-color); margin: 20px 0; }
        .stat-item { padding: 12px 15px; border: 0.5px solid var(--line-color); display: flex; justify-content: space-between; font-size: 0.95rem; }
        .stat-val { color: var(--red-color); font-weight: bold; }

        .yiji-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .yiji-box h4 { color: var(--red-color); border-bottom: 2.5px solid var(--red-color); text-align: center; padding-bottom: 5px; margin-top: 0; font-size: 1.2rem; }
        .yiji-list { list-style: none; padding: 0; text-align: center; line-height: 2.2; font-weight: 600; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2 style="font-size: 1.8rem; letter-spacing: 5px;">LUCKY CANDLE</h2>
        <p style="opacity: 0.7;">請感應實體鑰匙開啟日曆</p>
    </div>

    <div class="calendar-wrapper" id="calendar-wrapper">
        <div class="tear-off-layer" id="tear-layer" onclick="ripPaper()">
            <div style="font-size: 0.75rem; letter-spacing: 4px; color: #888;">TRADITIONAL EDITION</div>
            <div class="cover-title">LUCKY CANDLE</div>
            <div style="font-size: 1.1rem; letter-spacing: 2px; font-weight: 500;">今日運勢日曆</div>
            <div class="cover-hint">點擊撕開</div>
        </div>

        <div class="calendar-card">
            <div class="header-brand">LUCKY CANDLE</div>
            
            <div style="text-align: center;">
                <div class="location-tag" id="display-location">定位同步中</div>
                <div id="display-date-str" style="font-size: 0.95rem; font-weight: bold;">2026.03.12</div>
                <div class="date-main" id="display-day-num">12</div>
                <div class="weekday-label" id="display-weekday">Thursday</div>
            </div>

            <div class="divider"></div>
            <div class="section-title">今日訊息</div>
            <div class="message-box" id="poem-text">正在讀取今日訊息...</div>

            <div class="divider"></div>
            <div class="section-title">整體運勢</div>
            <div class="rank-label-large" id="overall-rank-label">--</div>
            <div style="text-align: center; font-weight: 800; font-size: 1.1rem;" id="overall-rank-desc">分析中...</div>

            <div class="stats-grid" id="category-stats"></div>

            <div class="divider"></div>
            <div class="section-title">即時氣候</div>
            <div id="weather-info" style="text-align: center; font-weight: 800; font-size: 1.3rem;">數據載入中...</div>

            <div class="yiji-section">
                <div class="yiji-box"><h4>宜</h4><ul class="yiji-list" id="yi-list"></ul></div>
                <div class="yiji-box"><h4>忌</h4><ul class="yiji-list" id="ji-list"></ul></div>
            </div>
            
            <div style="text-align: center; margin: 40px 0 10px; opacity: 0.2; font-size: 0.7rem; letter-spacing: 2px;">
                GOODFUN TEAM // CALENDAR ENGINE V3.5
            </div>
        </div>
    </div>

<script>
    const MASTER_KEY = "GOODFUN_TOKEN_0427";
    const rarityLabels = { SSSR: "今天非常幸運", SSR: "事情看起來不錯", SR: "大致還算順利", R: "普通的一天", N: "沒有特別發生什麼", SP: "事情有點奇怪" };
    const yiOptions = ["散步", "慢慢來", "早點睡", "大口喝水", "看一本好書", "整理桌面", "深呼吸", "早起吃早餐", "斷捨離", "多讚美他人"];
    const jiOptions = ["拖延", "衝動購物", "熬夜", "隨口答應", "過度滑手機", "生氣糾結", "胡思亂想", "浪費食物", "遺失物品"];

    // 撕紙動畫
    function ripPaper() {
        const layer = document.getElementById('tear-layer');
        layer.classList.add('ripped');
        // 撕裂聲效
        const audio = new Audio('https://www.soundjay.com/human/paper-rip-1.mp3'); 
        audio.volume = 0.4;
        audio.play().catch(()=>{}); 
    }

    // 環境與地區資訊
    async function updateEnvironment() {
        if (!navigator.geolocation) {
            document.getElementById('display-location').innerText = "未知地區";
            return;
        }
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            try {
                const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&timezone=auto`);
                const wData = await wRes.json();
                document.getElementById('weather-info').innerText = `目前氣溫 ${Math.round(wData.current_weather.temperature)}°C`;
                
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=10`);
                const gData = await geoRes.json();
                const addr = gData.address;
                document.getElementById('display-location').innerText = addr.city || addr.town || addr.suburb || "目前地區";
            } catch(e) {
                document.getElementById('display-location').innerText = "數據同步失敗";
            }
        });
    }

    async function generateCalendar() {
        // 隱藏 URL 參數
        if (window.location.search.includes('key=')) {
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('calendar-wrapper').style.display = 'block';

        // 1. 日期處理
        const now = new Date();
        const weekdays = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        document.getElementById('display-date-str').innerText = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
        document.getElementById('display-day-num').innerText = now.getDate();
        document.getElementById('display-weekday').innerText = weekdays[now.getDay()];

        updateEnvironment();

        // 2. 抓取 JSON 籤詩
        try {
            const res = await fetch('messages.json');
            const data = await res.json();
            // 隨機選取一條
            const luckyItem = data[Math.floor(Math.random() * data.length)];
            // 支援兩種格式：單純字串陣列或物件陣列
            document.getElementById('poem-text').innerText = typeof luckyItem === 'string' ? luckyItem : (luckyItem.text || luckyItem.message);
        } catch(e) {
            console.error("JSON Error:", e);
            document.getElementById('poem-text').innerText = "今天沒有奇蹟，但也沒有爆炸。";
        }

        // 3. 隨機運勢生成
        const mainRarity = Object.keys(rarityLabels)[Math.floor(Math.random() * 6)];
        document.getElementById('overall-rank-label').innerText = mainRarity;
        document.getElementById('overall-rank-desc').innerText = rarityLabels[mainRarity];

        const cats = ["戀愛", "金錢", "工作", "健康"];
        document.getElementById('category-stats').innerHTML = cats.map(c => `
            <div class="stat-item"><span>${c}</span><span class="stat-val">${Object.keys(rarityLabels)[Math.floor(Math.random()*6)]}</span></div>
        `).join('');

        // 4. 宜忌隨機抽取
        document.getElementById('yi-list').innerHTML = [...yiOptions].sort(() => 0.5 - Math.random()).slice(0, 3).map(i => `<li>${i}</li>`).join('');
        document.getElementById('ji-list').innerHTML = [...jiOptions].sort(() => 0.5 - Math.random()).slice(0, 3).map(i => `<li>${i}</li>`).join('');
    }

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('key') === MASTER_KEY) {
            generateCalendar();
        }
    };
</script>
</body>
</html>

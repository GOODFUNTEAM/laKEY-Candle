<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Candle - 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-white: #F2F0E9;
            --calendar-blue: #0055FF; /* 參考圖中的寶藍色 */
            --calendar-red: #E60012;  /* 傳統日曆紅 */
            --ink-black: #1A1A1A;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: #333; /* 背景深色，凸顯日曆紙張 */
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            font-family: sans-serif;
        }

        /* 鎖定畫面 */
        #lock-screen { 
            position: absolute; text-align: center; color: white; 
            font-family: 'Noto Serif TC', serif; letter-spacing: 5px;
        }

        /* 日曆主體 - 模擬老日曆視覺 */
        .calendar-paper {
            background-color: var(--paper-white);
            width: 92vw; max-width: 400px;
            height: 94vh;
            padding: 15px;
            border: 2px solid var(--ink-black);
            display: none; /* 初期隱藏 */
            flex-direction: column;
            position: relative;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
            background-image: radial-gradient(#e1ded6 1px, transparent 0); /* 模擬紙張質地 */
            background-size: 20px 20px;
        }

        /* 頂部商號與 LOGO */
        .top-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px double var(--ink-black);
            padding-bottom: 8px; margin-bottom: 10px;
        }
        .logo-area { width: 50px; height: 50px; }
        .brand-name { font-family: 'Noto Serif TC', serif; font-size: 1.2rem; color: var(--calendar-red); font-weight: 900; }

        /* 日期大字區 */
        .main-date-box {
            text-align: center; flex-grow: 1;
            display: flex; flex-direction: column; justify-content: center;
            border: 2px solid var(--calendar-blue); margin: 5px 0;
            position: relative;
        }
        .month-label { position: absolute; top: 10px; left: 10px; color: var(--calendar-blue); font-weight: bold; font-size: 1.5rem; }
        .day-big {
            font-family: sans-serif; /* 傳統日曆常用無襯線粗體 */
            font-size: 10rem; font-weight: 900;
            color: var(--calendar-blue); line-height: 0.9;
        }
        .weekday-bar {
            background-color: var(--calendar-blue); color: white;
            font-size: 2rem; font-weight: 900; padding: 5px 0; letter-spacing: 10px;
        }

        /* 資訊網格 (參考老日曆格線) */
        .info-grid {
            display: grid; grid-template-columns: 1fr 2fr 1fr;
            border-top: 2px solid var(--ink-black);
            margin-top: 10px;
        }
        .grid-cell { border-right: 1px solid var(--ink-black); border-bottom: 1px solid var(--ink-black); padding: 5px; font-size: 0.8rem; }
        .cell-title { color: var(--calendar-red); font-weight: bold; display: block; margin-bottom: 2px; border-bottom: 1px solid var(--line-color); }
        
        /* 宜忌區 */
        .yiji-grid { display: grid; grid-template-columns: 1fr 1fr; border: 2px solid var(--ink-black); margin-top: 10px; }
        .yi { border-right: 2px solid var(--ink-black); background: rgba(230, 0, 18, 0.05); }
        .yiji-title { font-weight: 900; font-size: 1.2rem; padding: 2px; display: block; text-align: center; border-bottom: 1px solid var(--ink-black); }
        .yi .yiji-title { color: var(--calendar-red); }
        .ji .yiji-title { color: var(--ink-black); }
        .yiji-content { padding: 5px; font-weight: bold; font-size: 1rem; text-align: center; min-height: 60px; line-height: 1.4; }

        /* 籤詩名言 */
        .maxim-box {
            margin-top: auto; padding: 10px;
            border: 1px dashed var(--ink-black);
            font-family: 'Noto Serif TC', serif;
            font-size: 1.2rem; font-weight: 700; text-align: center;
            color: #333; line-height: 1.4;
        }

        /* 許願區 */
        .wish-bar {
            margin-top: 10px; display: flex; border: 2px solid var(--calendar-red);
        }
        .wish-input { flex-grow: 1; border: none; padding: 8px; font-size: 1rem; outline: none; background: transparent; }
        .wish-btn { background: var(--calendar-red); color: white; border: none; padding: 0 15px; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2>LUCKY CANDLE</h2>
        <p id="lock-msg">請感應實體鑰匙</p>
    </div>

    <div class="calendar-paper" id="main-calendar">
        <div class="top-header">
            <div class="brand-name">瑋豪工坊謹製</div>
            <div class="logo-area">
                <img src="logo_8bit_green.svg" alt="LOGO" style="width:100%; height:100%;">
            </div>
            <div class="brand-name">二零二六</div>
        </div>

        <div class="main-date-box">
            <div class="month-label" id="month-label">--月</div>
            <div class="day-big" id="day-label">--</div>
            <div class="weekday-bar" id="week-label">星期-</div>
        </div>

        <div class="info-grid">
            <div class="grid-cell"><span class="cell-title">財運</span><div id="stat-money">--</div></div>
            <div class="grid-cell" style="text-align: center;"><span class="cell-title">今日運勢</span><div id="rank-label" style="font-size: 1.5rem; font-weight: 900; color: var(--calendar-red);">--</div></div>
            <div class="grid-cell"><span class="cell-title">感情</span><div id="stat-love">--</div></div>
        </div>

        <div class="yiji-grid">
            <div class="yi">
                <span class="yiji-title">宜</span>
                <div class="yiji-content" id="yi-content"></div>
            </div>
            <div class="ji">
                <span class="yiji-title">忌</span>
                <div class="yiji-content" id="ji-content"></div>
            </div>
        </div>

        <div class="maxim-box" id="maxim-text">
            「 人生沒有白走的路，每一步都算數。」
        </div>

        <div class="wish-bar" id="wish-box">
            <input type="text" id="wish-input" class="wish-input" placeholder="輸入今日願望..." maxlength="15">
            <button class="wish-btn" onclick="lockWish()">點燃</button>
        </div>
        
        <div class="footer-logo" style="text-align: center; font-size: 0.6rem; margin-top: 5px; opacity: 0.5;">
            GOODFUN TEAM CALENDAR V6.0 // NFC SECURED
        </div>
    </div>

<script>
    const MASTER_KEY = "GOODFUN_TOKEN_0427";
    const rarity = { SSSR: "大吉", SSR: "上吉", SR: "中吉", R: "小吉", N: "平", SP: "密" };

    function getToday() { return new Date().toDateString(); }

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const userKey = urlParams.get('key');
        const today = getToday();
        const hasAuth = localStorage.getItem('auth_date');

        if (userKey === MASTER_KEY || hasAuth === today) {
            localStorage.setItem('auth_date', today);
            if (userKey === MASTER_KEY) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            initCalendar();
        } else {
            document.getElementById('lock-msg').innerText = "未偵測到實體鑰匙";
        }
    };

    async function initCalendar() {
        const today = getToday();
        const saved = JSON.parse(localStorage.getItem('daily_data'));

        let data;
        if (saved && saved.date === today) {
            data = saved;
        } else {
            // 生成新數據
            data = {
                date: today,
                rank: Object.keys(rarity)[Math.floor(Math.random() * 6)],
                money: Object.values(rarity)[Math.floor(Math.random() * 6)],
                love: Object.values(rarity)[Math.floor(Math.random() * 6)],
                yi: ["散步", "喝茶", "早睡", "開窗", "大笑"].sort(()=>.5-Math.random()).slice(0,2).join("<br>"),
                ji: ["熬夜", "焦慮", "亂買", "生氣", "悲觀"].sort(()=>.5-Math.random()).slice(0,2).join("<br>"),
                maxim: "載入中..."
            };
            
            try {
                const res = await fetch('messages.json');
                const msgs = await res.json();
                data.maxim = msgs[Math.floor(Math.random() * msgs.length)];
            } catch(e) { data.maxim = "順著光走，就不會迷路。"; }
            
            localStorage.setItem('daily_data', JSON.stringify(data));
        }

        render(data);
    }

    function render(data) {
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('main-calendar').style.display = 'flex';

        const now = new Date();
        document.getElementById('month-label').innerText = (now.getMonth() + 1) + "月";
        document.getElementById('day-label').innerText = now.getDate();
        document.getElementById('week-label').innerText = "星期" + ["日","一","二","三","四","五","六"][now.getDay()];

        document.getElementById('rank-label').innerText = rarity[data.rank];
        document.getElementById('stat-money').innerText = data.money;
        document.getElementById('stat-love').innerText = data.love;
        document.getElementById('yi-content').innerHTML = data.yi;
        document.getElementById('ji-content').innerHTML = data.ji;
        document.getElementById('maxim-text').innerText = `「 ${data.maxim} 」`;

        // 願望顯示
        const sw = localStorage.getItem('today_wish');
        if (sw && localStorage.getItem('wish_date') === getToday()) {
            document.getElementById('wish-box').innerHTML = `<div style="width:100%; text-align:center; padding:8px; font-weight:bold; color:var(--calendar-red);">願望封存：${sw}</div>`;
        }
    }

    function lockWish() {
        const val = document.getElementById('wish-input').value.trim();
        if(!val) return;
        localStorage.setItem('today_wish', val);
        localStorage.setItem('wish_date', getToday());
        location.reload();
    }
</script>
</body>
</html>

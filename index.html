<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>laKEY Candle</title>
    <style>
        :root {
            --bg-color: #050505;
            --main-green: #00ff41;
            --error-red: #ff3e3e;
            --gold: #ffcc00;
            --safe-bottom: env(safe-area-inset-bottom);
        }
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; box-sizing: border-box; }
        input { user-select: auto; -webkit-user-select: auto; }
        
        body, html {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--main-green);
            font-family: 'Courier New', Courier, monospace; height: 100dvh; width: 100vw; overflow: hidden;
        }

        #auth-error { display: none; padding: 40px; justify-content: center; align-items: center; height: 100%; text-align: center; }
        #app { display: none; padding: 20px 25px calc(20px + var(--safe-bottom)); flex-direction: column; height: 100%; }

        .status-bar {
            font-size: 9px; border-bottom: 2px solid var(--main-green); padding-bottom: 8px; 
            margin-top: env(safe-area-inset-top); display: flex; justify-content: space-between; letter-spacing: 0.5px;
        }

        /* 核心視覺區 */
        .wireframe-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        
        /* 問號容器：負責上下浮動 */
        .question-wrapper {
            width: 120px; height: 160px;
            display: flex; justify-content: center; align-items: center;
            animation: float 3s ease-in-out infinite; /* 初始浮動 */
            position: relative;
        }

        /* 問號本體：負責抽籤時的旋轉 */
        .question-mark {
            font-size: 100px; font-weight: bold;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 15px var(--main-green);
            user-select: none;
            transition: transform 0.5s;
        }

        /* 旋轉動畫類別 (由 JS 觸發) */
        .is-igniting {
            animation: rotate-fast 0.4s linear infinite !important;
        }

        /* 火焰畫布：放在問號後方作為背景 */
        #fire-canvas {
            position: absolute; bottom: 10px; width: 80px; height: 100px;
            image-rendering: pixelated; opacity: 0.6; pointer-events: none;
        }

        .wireframe-label { margin-top: 20px; font-size: 9px; letter-spacing: 2px; opacity: 0.7; }

        /* 輸入區域 */
        input[type="text"] {
            width: 100%; background: rgba(0, 255, 65, 0.05); border: 1.5px solid var(--main-green);
            color: var(--main-green); padding: 18px; margin-bottom: 12px; outline: none; 
            font-size: 16px; border-radius: 0; text-align: center; letter-spacing: 2px;
            transition: all 0.3s; box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.1);
        }
        input[type="text"]:focus { background: rgba(0, 255, 65, 0.12); border-color: #fff; }

        .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .cat-btn { background: transparent; border: 1px solid var(--main-green); color: var(--main-green); padding: 14px 0; font-size: 13px; cursor: pointer; }
        .cat-btn.active { background: var(--main-green); color: #000; font-weight: bold; }
        .ignite-btn { grid-column: span 3; margin-top: 8px; border: 2px solid var(--gold); color: var(--gold); font-weight: bold; padding: 18px 0; letter-spacing: 4px; cursor: pointer; }

        /* 結果畫面 */
        #result-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 100; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 25px;
        }
        #res-desc { max-width: 100%; line-height: 1.8; font-size: 18px; margin: 25px 0; white-space: pre-wrap; letter-spacing: 1px; }
        .level-display { font-size: 80px; font-weight: bold; }

        /* 動態定義 */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        @keyframes rotate-fast {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
    </style>
</head>
<body>

    <div id="auth-error">
        <div>
            <h1 style="color: var(--error-red); font-size: 24px;">[ laKEY Candle ]</h1>
            <p id="ui-denied"></p>
            <p id="ui-denied-desc"></p>
        </div>
    </div>

    <div id="app">
        <div class="status-bar">
            <span id="ui-id">UNIT: 087 / TZ: UTC...</span>
            <div>
                <span id="weather-tag">ENV: SCANNING...</span>
                <span id="lang-toggle" onclick="toggleLang()" style="margin-left:8px; border:1px solid var(--main-green); padding:0 4px; cursor:pointer;">EN</span>
            </div>
        </div>
        
        <div class="wireframe-container">
            <div class="question-wrapper" id="q-wrapper">
                <canvas id="fire-canvas"></canvas>
                <div class="question-mark" id="target-visual">?</div>
            </div>
            <div class="wireframe-label" id="ui-core-label">FDM_WIRE_LIT / laKEY_CORE</div>
        </div>

        <div class="interaction-area">
            <input type="text" id="wish-input" placeholder="" maxlength="20" autocomplete="off" oninput="playTypingSound()">
            <div class="category-grid">
                <button class="cat-btn" data-cat="marriage" onclick="setCat('marriage', this)">婚姻</button>
                <button class="cat-btn" data-cat="wealth" onclick="setCat('wealth', this)">求財</button>
                <button class="cat-btn" data-cat="career" onclick="setCat('career', this)">事業</button>
                <button class="cat-btn" data-cat="exam" onclick="setCat('exam', this)">考試</button>
                <button class="cat-btn" data-cat="travel" onclick="setCat('travel', this)">遠行</button>
                <button class="cat-btn ignite-btn" id="ui-ignite-btn" onclick="ignite()"></button>
            </div>
        </div>
    </div>

    <div id="result-overlay">
        <p id="res-header" style="font-size: 11px; color: var(--main-green); border: 1px solid var(--main-green); padding: 6px 15px;"></p>
        <div id="res-level" class="level-display"></div>
        <p id="res-desc"></p>
        <button id="ui-cooling-btn" onclick="location.reload()" style="margin-top: 40px; background: transparent; border: 1px solid var(--main-green); color: var(--main-green); padding: 15px 40px; font-size: 11px; letter-spacing: 2px; cursor:pointer;"></button>
    </div>

    <script>
        const i18n = {
            zh: { placeholder: "> 注入你的意念 / INJECT INTENT", ignite: "執行鑑定 / IGNITE", coreLabel: "FDM_WIRE_LIT / laKEY_CORE", cooling: "系統冷卻 / RE-IGNITE", denied: "ACCESS_STATUS: DENIED", deniedDesc: "本系統需感應專屬載體啟動", marriage: "婚姻", wealth: "求財", career: "事業", exam: "考試", travel: "遠行" },
            en: { placeholder: "> INJECT YOUR INTENT...", ignite: "EXECUTE / IGNITE", coreLabel: "FDM_WIRE_LIT / laKEY_CORE", cooling: "COOLING / RE-IGNITE", denied: "ACCESS_STATUS: DENIED", deniedDesc: "NFC TAG REQUIRED FOR ACCESS", marriage: "MARRIAGE", wealth: "WEALTH", career: "CAREER", exam: "EXAM", travel: "TRAVEL" }
        };

        let currentLang = localStorage.getItem('lakey_lang') || 'zh';
        let messages = [];
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 8-bit 火焰邏輯
        function initFire() {
            const canvas = document.getElementById('fire-canvas');
            const ctx = canvas.getContext('2d');
            const w = 30, h = 50; canvas.width = w; canvas.height = h;
            let pixels = new Array(w * h).fill(0);
            function animate() {
                for (let i = 0; i < w; i++) pixels[(h - 1) * w + i] = Math.random() > 0.4 ? 255 : 0;
                for (let y = 0; y < h - 1; y++) {
                    for (let x = 0; x < w; x++) {
                        const idx = y * w + x;
                        const decay = Math.floor(Math.random() * 25);
                        pixels[idx] = Math.max(0, pixels[(y + 1) * w + x] - decay);
                    }
                }
                ctx.clearRect(0, 0, w, h);
                for (let i = 0; i < pixels.length; i++) {
                    if (pixels[i] > 0) {
                        ctx.fillStyle = `rgb(0, ${pixels[i]}, 0)`;
                        ctx.fillRect(i % w, Math.floor(i / w), 1, 1);
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        }

        async function loadMessages() {
            try { const res = await fetch('messages.json'); messages = await res.json(); }
            catch (e) { messages = ["SYSTEM_ERROR: MSG_LOAD_FAILED"]; }
        }

        // 天氣系統
        async function getWeather() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (p) => {
                    try {
                        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${p.coords.latitude}&lon=${p.coords.longitude}&units=metric&appid=YOUR_API_KEY&lang=zh_tw`);
                        const d = await res.json();
                        const temp = Math.round(d.main.temp);
                        document.getElementById('weather-tag').innerText = `ENV: ${d.name.toUpperCase()} ${temp}°C`;
                        if (temp <= 15) document.documentElement.style.setProperty('--main-green', '#00f2ff');
                        else if (temp >= 30) document.documentElement.style.setProperty('--main-green', '#ff4e00');
                    } catch (e) { document.getElementById('weather-tag').innerText = "ENV: LOCAL_SCAN"; }
                }, () => document.getElementById('weather-tag').innerText = "ENV: LOCAL_SCAN");
            }
        }

        function playTypingSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.02);
            osc.start(); osc.stop(audioCtx.currentTime + 0.02);
        }

        function playBeep(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'select') {
                osc.type = 'square'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'ignite') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(110, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.6);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6);
                osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            } else if (type === 'result') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(1320, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        function updateUILanguage() {
            const lang = i18n[currentLang];
            document.getElementById('wish-input').placeholder = lang.placeholder;
            document.getElementById('ui-core-label').innerText = lang.coreLabel;
            document.getElementById('ui-ignite-btn').innerText = lang.ignite;
            document.getElementById('ui-cooling-btn').innerText = lang.cooling;
            document.getElementById('ui-denied').innerText = lang.denied;
            document.getElementById('ui-denied-desc').innerText = lang.deniedDesc;
            document.getElementById('lang-toggle').innerText = currentLang === 'zh' ? 'EN' : '中文';
            document.querySelectorAll('.cat-btn[data-cat]').forEach(btn => { btn.innerText = lang[btn.getAttribute('data-cat')]; });
        }

        function toggleLang() { playBeep('select'); currentLang = currentLang === 'zh' ? 'en' : 'zh'; localStorage.setItem('lakey_lang', currentLang); updateUILanguage(); }

        const SECRET = "GF87CANDLE";
        const params = new URLSearchParams(window.location.search);
        if (params.get('token') !== SECRET) {
            document.getElementById('auth-error').style.display = 'flex';
            updateUILanguage();
        } else {
            document.getElementById('app').style.display = 'flex';
            window.history.replaceState({}, document.title, window.location.pathname);
            updateUILanguage();
            init();
        }

        function init() {
            loadMessages();
            initFire();
            getWeather();
            const offset = new Date().getTimezoneOffset() / -60;
            const tz = offset >= 0 ? `+${offset}` : offset;
            document.getElementById('ui-id').innerText = `UNIT: 087 / TZ: UTC${tz}`;
            const last = JSON.parse(localStorage.getItem('lakey_record'));
            if (last && last.date === new Date().toLocaleDateString()) showResult(last);
        }

        let currentCat = "";
        const rarities = [{lv:'SSSR',c:2},{lv:'SSR',c:8},{lv:'SR',c:15},{lv:'R',c:30},{lv:'N',c:40},{lv:'SP',c:5}];

        function setCat(k, b) {
            currentCat = i18n[currentLang][k]; playBeep('select');
            document.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
        }

        async function ignite() {
            const w = document.getElementById('wish-input').value;
            if (!w || !currentCat) return;
            if (messages.length === 0) await loadMessages();
            playBeep('ignite');
            
            // 觸發旋轉動畫
            document.getElementById('target-visual').classList.add('is-igniting');
            
            const roll = Math.random() * 100;
            let acc = 0, rarity = rarities[4];
            for (const i of rarities) { acc += i.c; if (roll <= acc) { rarity = i; break; } }
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            const rec = { date: new Date().toLocaleDateString(), cat: currentCat, wish: w, lv: rarity.lv, desc: randomMsg };
            localStorage.setItem('lakey_record', JSON.stringify(rec));
            setTimeout(() => showResult(rec), 2000);
        }

        function showResult(r) {
            playBeep('result');
            document.getElementById('result-overlay').style.display = 'flex';
            document.getElementById('res-header').innerText = `ID: ${r.cat} / INTENT: ${r.wish}`;
            const lvEl = document.getElementById('res-level');
            lvEl.innerText = r.lv;
            lvEl.className = 'level-display ' + r.lv.toLowerCase();
            document.getElementById('res-desc').innerText = r.desc;
        }
    </script>
</body>
</html>

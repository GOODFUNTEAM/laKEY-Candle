<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lucky Candle – GOODFUN TEAM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lock-screen">
        <h2>LUCKY<br>CANDLE</h2>
        <div id="lock-msg">🔒 請感應實體鑰匙解鎖運勢</div>
        <div id="lock-hint">此運勢僅限持有實體鑰匙圈者查看，請勿任意分享此連結</div>
    </div>

    <div id="setup-screen">
        <h3>初次見面</h3>
        <p>幫你的鑰匙圈取個名字，並留下重要日期，我們會記住的。</p>
        <div class="setup-field">
            <label>暱稱</label>
            <input type="text" id="setup-nickname" maxlength="10" placeholder="想被怎麼稱呼？">
        </div>
        <div class="setup-field">
            <label>生日 / 紀念日（選填）</label>
            <input type="date" id="setup-birthday">
        </div>
        <div class="setup-actions">
            <button class="primary" onclick="completeSetup()">開始使用</button>
        </div>
        <div class="setup-skip" onclick="skipSetup()">先跳過，之後再說</div>
    </div>

    <div id="welcome-screen">
        <div id="welcome-text"></div>
    </div>

    <div class="calendar-paper" id="main-calendar" style="display: none;">

        <!-- 頂部：品牌 header -->
        <a href="https://www.instagram.com/goodfun_team/" target="_blank" class="ig-link">
            <span class="team-name">孤芳小隊</span>
            <span class="team-name" style="font-size: 0.65rem; text-align: right; letter-spacing: 0;">GOODFUN TEAM</span>
        </a>

        <!-- 巨大日期數字區：貫穿版面的視覺重心，其他小標籤故意疊上去產生疊色 -->
        <div id="giant-date-zone">
            <div id="giant-date">22</div>
            <div class="tag tag-map" id="tag-map" onclick="openMapModal()">
                <div id="map-thumb-wrap"><div id="map-thumb-pin"></div></div>
                <div id="map-loc-text">定位中</div>
            </div>
            <div class="tag tag-week" id="tag-week">星期-</div>
            <div class="tag tag-month" id="tag-month">--月</div>
            <div class="tag tag-weather" id="tag-weather">--°C ・ -- ・ --%</div>
            <div class="tag tag-yiji" id="tag-yiji">宜 -- ｜ 忌 --</div>
            <div class="tag tag-bday" id="tag-bday" style="display:none;"></div>
            <div class="tag tag-nickname" id="tag-nickname" style="display:none;"></div>
        </div>

        <!-- 每日運勢抽籤（御神籤）：先感應蠟燭，再看抽籤結果 -->
        <div id="candle-omikuji-zone">
            <div id="candle-stage">
                <div id="candle-visual" onclick="blowCandle('tap')">🕯️ <span id="candle-label">點一下吹熄蠟燭，看今日籤</span></div>
                <div id="candle-mic-toggle" onclick="toggleMicBlow()">🎙️ 開麥克風真的吹</div>
            </div>
            <div id="omikuji-result" style="display:none;">
                <div id="theme-banner" onclick="toggleOmikujiDetail()">
                    <span id="theme-text">籤 ・ 載入中...</span>
                    <div style="font-size:0.55rem;opacity:0.5;margin-top:2px;">(點擊看完整籤詩)</div>
                </div>
                <div id="omikuji-detail">
                    <div id="om-poem"></div>
                    <div id="om-explain"></div>
                    <div id="om-fortunes"></div>
                </div>
            </div>
        </div>

        <!-- 命運／機會：自選一張撕開，另一張當天鎖住 -->
        <div class="destiny-wrap" id="destiny-wrap">
            <div class="paper-card" id="card-destiny" onclick="chooseFate('destiny')">
                <div class="card-front">? 命運 ?</div>
                <div class="card-back" id="text-destiny"></div>
            </div>
            <div class="paper-card" id="card-opportunity" onclick="chooseFate('opportunity')">
                <div class="card-front">! 機會 !</div>
                <div class="card-back" id="text-opportunity"></div>
            </div>
        </div>

        <!-- 每日許願 -->
        <div id="wish-container">
            <div class="wish-zone">
                <input type="text" id="wish-input" class="wish-in" placeholder="寫下今天的願望..." maxlength="14">
                <button class="wish-go" onclick="setWish()">點燃</button>
            </div>
        </div>

        <div class="footer">
            <div style="font-size: 0.5rem; opacity: 0.6; margin-bottom: 2px;">距離今日結束還有 <span id="timer">--:--:--</span></div>
            <div class="footer-row">
                <span>EDITION #<span id="edition-id">---</span></span>
                <button id="share-btn" onclick="shareCard()">分享今日運勢</button>
            </div>
        </div>
    </div>

    <!-- 地圖彈窗：點小地圖縮圖後展開，台灣顯示368區精細地圖，海外顯示世界地圖 -->
    <div id="map-modal" onclick="closeMapModal(event)">
        <div id="map-modal-inner">
            <div id="map-modal-close" onclick="closeMapModal(event)">✕</div>
            <div id="map-modal-title">你在這裡</div>
            <div id="map-modal-svg-wrap"></div>
        </div>
    </div>

    <canvas id="share-canvas" width="640" height="900" style="display:none;"></canvas>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>laKEY-Candle: SURVIVAL_TERMINAL</title>
    <style>
        :root {
            --pip-green: #18ff62;
            --pip-bg: #0c120c;
            --pip-dim: #063d17;
        }

        body {
            background-color: var(--pip-bg);
            color: var(--pip-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-transform: uppercase;
            overflow: hidden;
        }

        /* 經典掃描線 */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 100;
            background-size: 100% 3px;
            pointer-events: none;
            opacity: 0.3;
        }

        .container { width: 92%; max-width: 450px; text-align: center; z-index: 10; }

        #logo-svg { width: 100px; height: 100px; margin-bottom: 15px; }
        .spin-slow { animation: spin 10s linear infinite; opacity: 0.5; }
        .spin-fast { animation: spin 0.15s linear infinite !important; filter: drop-shadow(0 0 10px var(--pip-green)); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .ui-box {
            border: 2px solid var(--pip-green);
            padding: 15px;
            background: rgba(24, 255, 98, 0.02);
            box-shadow: 0 0 20px var(--pip-dim);
            text-align: left;
            min-height: 350px;
        }

        /* 環境報告區 */
        #env-report {
            font-size: 0.7rem;
            line-height: 1.4;
            border-bottom: 1px solid var(--pip-dim);
            padding-bottom: 10px;
            margin-bottom: 10px;
            display: none;
        }

        #main-status { font-weight: bold; margin-bottom: 5px; text-align: center; }
        .blink { animation: blink-anim 1s steps(2, start) infinite; }
        @keyframes blink-anim { to { visibility: hidden; } }

        #result-area { display: none; }
        .ranks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 0.7rem; }
        .rank-item { border: 1px solid var(--pip-dim); padding: 4px; display: flex; justify-content: space-between; }
        .tag-sssr { background: var(--pip-green); color: var(--pip-bg); font-weight: bold; }
        
        #poem-text { 
            font-size: 1.1rem; 
            margin: 15px 0; 
            color: #fff; 
            text-align: center;
            text-shadow: 0 0 5px var(--pip-green); 
            border: 1px dashed var(--pip-dim);
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="logo-wrapper">
        <svg id="logo-svg" class="spin-slow" viewBox="0 0 100 100" fill="none" stroke="currentColor">
            <circle cx="50" cy="50" r="45" stroke-width="2"/>
            <path d="M50 20V80M20 50H80" stroke-width="2"/>
        </svg>
    </div>

    <div class="ui-box">
        <div id="env-report">
            [ ENVIRONMENTAL MONITORING ]<br>
            DATE: <span id="env-date">--/--/--</span><br>
            TIME: <span id="env-time">--:--:--</span><br>
            DATA: <span id="env-weather">SYNCING...</span>
        </div>

        <div id="main-status">> SYSTEM_LOCKED</div>
        <div id="instruction" class="blink" style="text-align: center; margin-top: 50px;">
            -- 請感應燭籤鑰匙啟動 --
        </div>
        
        <div id="result-area">
            <div class="ranks-grid" id="ranks-container"></div>
            <div id="poem-text">...</div>
            <div style="font-size: 8px; color: var(--pip-dim); text-align: center;">ID: 04:27:AF_VERIFIED // GOODFUN_OS</div>
        </div>
    </div>
</div>

<script>
    const MASTER_KEY = "GOODFUN_TOKEN_0427";

    async function executeDraw() {
        // 清理網址防止外流
        if (window.location.search.includes('key=')) {
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        const logo = document.getElementById('logo-svg');
        const status = document.getElementById('main-status');
        const instruction = document.getElementById('instruction');
        const resultArea = document.getElementById('result-area');
        const envBox = document.getElementById('env-report');

        logo.className = 'spin-fast';
        status.innerText = "> ACCESS_GRANTED";
        instruction.innerText = "UPLOADING_SURVIVAL_DATA...";
        
        try {
            // 抓取天氣
            const weatherRes = await fetch("https://api.open-meteo.com/v1/forecast?latitude=25.03&longitude=121.53&current_weather=true&timezone=auto");
            const weatherData = await weatherRes.json();
            const w = weatherData.current_weather;
            
            // 抓取籤詩
            const poemRes = await fetch('messages.json');
            const poems = await poemRes.json();

            await new Promise(r => setTimeout(r, 1800));

            // 更新日期與時間
            const now = new Date();
            document.getElementById('env-date').innerText = now.toLocaleDateString();
            document.getElementById('env-time').innerText = now.toLocaleTimeString();
            document.getElementById('env-weather').innerText = `TEMP: ${w.temperature}°C / WIND: ${w.windspeed}kmh`;

            // 計算運勢
            const rarity = [{n:"SSSR",w:1,c:"tag-sssr"},{n:"SSR",w:4,c:""},{n:"SP",w:5,c:""},{n:"SR",w:15,c:""},{n:"R",w:45,c:""},{n:"N",w:30,c:""}];
            const cats = ["LOVE", "WEALTH", "CAREER", "TRAVEL", "HEALTH", "OVERALL"];
            let rankHtml = '';
            cats.forEach(cat => {
                const rand = Math.random() * 100;
                let sum = 0, sel = rarity[5];
                for(let r of rarity) {
                    sum += r.w;
                    if(rand <= sum) { sel = r; break; }
                }
                rankHtml += `<div class="rank-item"><span>${cat}</span><span class="${sel.c}">${sel.n}</span></div>`;
            });

            const lucky = poems[Math.floor(Math.random() * poems.length)];
            document.getElementById('ranks-container').innerHTML = rankHtml;
            document.getElementById('poem-text').innerText = typeof lucky === 'string' ? lucky : lucky.text;
            
            // 最終呈現
            envBox.style.display = 'block';
            logo.className = 'spin-slow';
            status.innerText = "> ANALYSIS_COMPLETE";
            instruction.style.display = 'none';
            resultArea.style.display = 'block';

        } catch (e) {
            status.innerText = "> ERR: SIGNAL_LOST";
        }
    }

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('key') === MASTER_KEY) {
            executeDraw();
        }
    };
</script>
</body>
</html>

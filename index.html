<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Candle – GOODFUN TEAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="lock-screen" style="display: flex;">
        <h2>LUCKY CANDLE</h2>
        <div id="lock-msg">🔒 請感應實體鑰匙解鎖運勢</div>
    </div>

    <div class="calendar-paper" id="main-calendar">
        
        <a href="https://www.instagram.com/goodfun_team/" target="_blank" class="ig-link">
            <span class="team-name">孤芳小隊</span>
            <img src="logo_8bit_green.svg" alt="IG" class="logo-img" onerror="this.style.display='none'">
            <span class="team-name" style="font-size: 0.7rem; text-align: right; letter-spacing: 0;">GOODFUN<br>TEAM</span>
        </a>

        <div class="date-box">
            <div class="month-tag" id="m-tag">--月</div>
            <div class="day-num" id="d-tag">--</div>
            <div class="week-bar" id="w-tag">星期-</div>
        </div>

        <div class="info-grid">
            <div class="cell"><span class="cell-label">地點</span><div class="cell-val" id="loc-val">同步中</div></div>
            <div class="cell"><span class="cell-label">運勢</span><div class="cell-val" id="rank-val" style="color:var(--red);">--</div></div>
            <div class="cell"><span class="cell-label">氣溫</span><div class="cell-val" id="temp-val">--</div></div>
        </div>

        <div class="yiji-wrap">
            <div class="yiji-box yi"><span class="yiji-head">宜</span><ul class="yiji-list" id="yi-list"></ul></div>
            <div class="yiji-box ji"><span class="yiji-head">忌</span><ul class="yiji-list" id="ji-list"></ul></div>
        </div>

        <div class="maxim" id="maxim-text">讀取中...</div>

        <div id="wish-container">
            <div class="wish-zone">
                <input type="text" id="wish-input" class="wish-in" placeholder="寫下願望..." maxlength="12">
                <button class="wish-go" onclick="setWish()">點燃</button>
            </div>
        </div>

        <div class="countdown-zone">
            距離今日結束還有 <span id="timer">--:--:--</span>
        </div>

        <div class="footer">GOODFUN TEAM // LUCKY CANDLE V9.2</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
